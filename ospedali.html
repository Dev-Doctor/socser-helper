<body>
    <style>
        body.flash {
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0% {
                background: white;
            }

            50% {
                background: black;
            }

            100% {
                background: white;
            }
        }
    </style>

    <div class="d-flex justify-content-center mt-3">
        <div class="alert alert-danger d-flex align-items-center w-60" role="alert">
            <i class="bi flex-shrink-0 me-2 bi-exclamation-triangle-fill"></i>
            <div>
                <i><strong>Oh oh!</strong> Sembra che tu sia finito su una pagina incompleta <strong>:))</strong></i>
                <!-- <hr> -->
            </div>
        </div>
    </div>
    <div class="container mt-3">
        <div class="d-flex justify-content-center">
            <h4><i id="heavy-text">Don't touch Heavy's honey...</i></h4>
        </div>
        <div class="d-flex justify-content-center">
            <img src="images/tf2-heavy.gif" id="heavy" alt="">
        </div>
        <div class="d-flex justify-content-center">
            <br>
            <br>
            <span><a class="nav-link" href="#" id="honey">🍯</a></span>
        </div>
    </div>
</body>

<script>
    $.get("snippets/layout.html", function (data) {
        $("body").prepend(data);
    });
    
    window.onload = function () {

    }

    $("#honey").on("click", function (e) {
        $("#heavy").attr("src","");
        $("#heavy").attr("width","400px");
        $("#heavy").attr("src","images/heavy-mad.png");
        $("body").addClass("flash");
        $("#heavy-text").text("...");
        $("#honey").text("_");
    });
</script>
