<!-- CODICE PER CAMBIARE IL TEMA -->
<script>
    $(document).ready(function () {
        function applyTheme(theme) {
            if (theme === "auto") {
                const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                $("html").attr("data-bs-theme", prefersDark ? "dark" : "light");
                $("#themeIcon").attr("class", "bi bi-circle-half");
            } else {
                $("html").attr("data-bs-theme", theme);
                $("#themeIcon").attr("class", theme === "dark" ? "bi bi-moon-stars-fill" : "bi bi-sun-fill");
            }

            localStorage.setItem("theme", theme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem("theme") || "auto";
        applyTheme(savedTheme);

        // Click handler
        $(".theme-option").on("click", function (e) {
            e.preventDefault();
            const selectedTheme = $(this).data("theme");
            applyTheme(selectedTheme);
        });
    });
</script>
